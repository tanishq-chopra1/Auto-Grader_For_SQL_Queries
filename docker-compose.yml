services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: grader
      POSTGRES_USER: grader
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  test_db:
    image: postgres:15
    environment:
      POSTGRES_DB: test_grader
      POSTGRES_USER: grader
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - test_postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./submissions:/app/submissions
      - ./reports:/app/reports
    environment:
      DATABASE_URL: postgresql+asyncpg://grader:password@db/grader
      TEST_DATABASE_URL: postgresql+asyncpg://grader:password@test_db/test_grader
      MONGO_URL: mongodb://mongo:27017
      REDIS_URL: redis://redis:6379/0
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
    depends_on:
      - db
      - test_db
      - mongo
      - redis

volumes:
  postgres_data:
  test_postgres_data:
  mongo_data: